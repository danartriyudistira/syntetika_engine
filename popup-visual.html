<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntetika Visual</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <canvas id="visual-canvas-popup"></canvas>
    <script type="module">
        import { ShaderEngine } from './src/core/shader-engine.js';

        const canvas = document.getElementById('visual-canvas-popup');
        const engine = new ShaderEngine();

        if (!engine.init(canvas)) {
            document.body.innerHTML = '<p style="color:#ff4444;padding:20px;font-family:monospace;">WebGL not available in this window</p>';
        } else {
            window.addEventListener('message', (event) => {
                if (event.source !== window.opener) return;
                const data = event.data;
                if (!data || !data.type) return;

                switch (data.type) {
                    case 'init':
                        if (data.shaderSource) {
                            engine.compileShader(data.shaderSource);
                        }
                        if (data.params) {
                            Object.entries(data.params).forEach(([k, v]) => engine.setParam(k, v));
                        }
                        engine.startLoop();
                        break;
                    case 'audio':
                        engine.setAudioData(data);
                        break;
                    case 'trigger-kind':
                        engine.trigger(data.kind, data.notePitch || 0);
                        break;
                    case 'trigger-voice':
                        engine.triggerDrumVoice(data.voice);
                        break;
                    case 'param':
                        engine.setParam(data.name, data.value);
                        break;
                    case 'ping':
                        if (window.opener) {
                            window.opener.postMessage({ type: 'popup-alive' }, '*');
                        }
                        break;
                }
            });

            window.addEventListener('beforeunload', () => {
                engine.destroy();
                if (window.opener) {
                    window.opener.postMessage({ type: 'popup-closed' }, '*');
                }
            });

            if (window.opener) {
                window.opener.postMessage({ type: 'popup-ready' }, '*');
            } else {
                engine.startLoop();
            }
        }
    </script>
</body>
</html>
