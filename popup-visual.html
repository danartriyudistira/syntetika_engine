<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntetika Visual</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { width: 100%; height: 100%; display: block; }
        #popup-status { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.3); font: 11px monospace; pointer-events: none; z-index: 10; }
        #popup-close { position: fixed; top: 12px; right: 12px; z-index: 10; background: rgba(0,0,0,0.5); color: #888; border: 1px solid #333; border-radius: 2px; padding: 6px 14px; font: 10px monospace; cursor: pointer; }
        #popup-close:hover { color: #fff; border-color: #666; }
    </style>
</head>
<body>
    <canvas id="visual-canvas-popup"></canvas>
    <div id="popup-status">Syntetika Visual Engine</div>
    <button id="popup-close" type="button">Close</button>
    <script type="module">
        import { ShaderEngine } from './src/core/shader-engine.js';

        const canvas = document.getElementById('visual-canvas-popup');
        const statusEl = document.getElementById('popup-status');
        const closeBtn = document.getElementById('popup-close');
        const engine = new ShaderEngine();

        if (!engine.init(canvas)) {
            document.body.innerHTML = '<p style="color:#ff4444;padding:20px;font-family:monospace;">WebGL not available in this window</p>';
        } else {
            engine.onFpsUpdate = (fps) => {
                statusEl.textContent = fps + ' FPS';
            };

            window.addEventListener('message', (event) => {
                if (event.source !== window.opener) return;
                const data = event.data;
                if (!data || !data.type) return;

                switch (data.type) {
                    case 'init':
                        if (data.shaderSource) {
                            engine.compileShader(data.shaderSource);
                        }
                        if (data.params) {
                            Object.entries(data.params).forEach(([k, v]) => engine.setParam(k, v));
                        }
                        engine.startLoop();
                        break;
                    case 'audio':
                        engine.setAudioData(data);
                        break;
                    case 'trigger-kind':
                        engine.trigger(data.kind, data.notePitch || 0);
                        break;
                    case 'trigger-voice':
                        engine.triggerDrumVoice(data.voice);
                        break;
                    case 'param':
                        engine.setParam(data.name, data.value);
                        break;
                    case 'ping':
                        if (window.opener) {
                            window.opener.postMessage({ type: 'popup-alive' }, '*');
                        }
                        break;
                }
            });

            closeBtn.addEventListener('click', () => {
                engine.destroy();
                if (window.opener) {
                    window.opener.postMessage({ type: 'popup-closed' }, '*');
                }
                window.close();
            });

            window.addEventListener('beforeunload', () => {
                engine.destroy();
                if (window.opener) {
                    window.opener.postMessage({ type: 'popup-closed' }, '*');
                }
            });

            if (window.opener) {
                window.opener.postMessage({ type: 'popup-ready' }, '*');
            } else {
                engine.startLoop();
            }
        }
    </script>
</body>
</html>
